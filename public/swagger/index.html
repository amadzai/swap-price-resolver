<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swap Price Resolver API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4/swagger-ui.css" />
  <style>
    .swagger-ui .topbar {
      display: none;
    }

    html,
    body {
      background: #000;
    }

    .swagger-ui {
      color: #9ca3af;
    }

    .swagger-ui :is(.info .title, .info h1, .info h2, .info h3, .opblock-tag, .opblock .opblock-summary-path, .opblock .opblock-summary-description, .parameter__name, .response-col_status) {
      color: #fff;
    }

    .swagger-ui :is(.info p, .info li, .markdown p, .markdown li, .parameter__type, .response-col_description__inner p, .opblock-description-wrapper p) {
      color: #9ca3af;
    }

    .swagger-ui .opblock-tag {
      background: #111111;
      border: 1px solid #222222;
      margin-bottom: 8px;
      padding: 12px 16px;
    }

    .swagger-ui .info :is(a, a:visited) {
      color: #9012fe;
    }

    .swagger-ui .info a:hover {
      color: #a73dff;
    }

    .swagger-ui .opblock .opblock-summary-method {
      color: #000 !important;
    }

    .swagger-ui .opblock .opblock-section-header {
      background: #111111 !important;
      border: 1px solid #222222;
    }

    .swagger-ui .opblock :is(.try-out__btn, .opblock-section-header h4, .opblock-section-header .tab-header .tab-item, .responses-inner h4, .parameters-col_description, .response-col_description, .response-col_status, .parameter__name, .parameter__type) {
      color: #9ca3af !important;
    }

    .swagger-ui .opblock :is(.parameters-col_name, .parameters-col_description, .parameters-col_schema) {
      color: #9ca3af !important;
    }

    .swagger-ui .opblock .tab li button.tablinks {
      color: #9ca3af !important;
    }

    .swagger-ui .model-example .tab li,
    .swagger-ui .model-example .tab li button,
    .swagger-ui .model-example .tab li button.tablinks {
      color: #9ca3af !important;
      opacity: 1 !important;
    }

    .swagger-ui .model-example .tab li.active,
    .swagger-ui .model-example .tab li.active button,
    .swagger-ui .model-example .tab li.active button.tablinks,
    .swagger-ui .model-example .tab li button.active,
    .swagger-ui .model-example .tab li button[aria-selected="true"] {
      background: #111111 !important;
      color: #fff !important;
      opacity: 1 !important;
      border-color: #222222 !important;
      text-shadow: none !important;
    }

    .swagger-ui .model-example .tab li.active button *,
    .swagger-ui .model-example .tab li button[aria-selected="true"] * {
      color: #fff !important;
      opacity: 1 !important;
    }

    .swagger-ui .model-example .model-box {
      background: #111111 !important;
      border: 1px solid #222222 !important;
    }

    .swagger-ui .model-example .model-box .model,
    .swagger-ui .model-example .model-box .model *,
    .swagger-ui .model-example .model-box .property,
    .swagger-ui .model-example .model-box .property.primitive {
      color: #fff !important;
      opacity: 1 !important;
    }

    .swagger-ui .opblock :is(input[type=text], input[type=password], input[type=search], input[type=email], textarea, select) {
      background: #111111 !important;
    }

    .swagger-ui .opblock.is-open :is(input[type=text], input[type=password], input[type=search], input[type=email], textarea):not([disabled]):not([readonly]),
    .swagger-ui .opblock.is-open select:not([disabled]) {
      color: #fff !important;
    }

    .swagger-ui section.models :is(h4, .model-title, .model-title__text, .property, .property.primitive, .model, .model-box) {
      color: #fff !important;
    }

    .swagger-ui section.models :is(.model-container, .model-box) {
      background: #111111 !important;
    }

    .swagger-ui :is(svg, .arrow, .expand-operation svg, .opblock-tag svg, .model-toggle::after, .opblock-control-arrow svg) {
      fill: #fff !important;
      color: #fff !important;
      stroke: #fff !important;
    }
  </style>
</head>

<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@4/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@4/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function () {
      window.ui = SwaggerUIBundle({
        url: "/swagger/openapi.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        layout: "StandaloneLayout"
      });
    };
  </script>
</body>

</html>
