<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swap Price Resolver API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4/swagger-ui.css" />
  <style>
    .swagger-ui .topbar {
      display: none;
    }

    html,
    body {
      background: #000;
    }

    .swagger-ui {
      color: #9ca3af;
    }

    .swagger-ui .info .title,
    .swagger-ui .info h1,
    .swagger-ui .info h2,
    .swagger-ui .info h3,
    .swagger-ui .opblock-tag,
    .swagger-ui .opblock .opblock-summary-path,
    .swagger-ui .opblock .opblock-summary-description,
    .swagger-ui .parameter__name,
    .swagger-ui .response-col_status {
      color: #fff;
    }

    .swagger-ui .info p,
    .swagger-ui .info li,
    .swagger-ui .markdown p,
    .swagger-ui .markdown li,
    .swagger-ui .parameter__type,
    .swagger-ui .response-col_description__inner p,
    .swagger-ui .opblock-description-wrapper p {
      color: #9ca3af;
    }

    .swagger-ui .opblock-tag {
      background: #111111;
      border: 1px solid #222222;
      margin-bottom: 8px;
      padding: 12px 16px;
    }

    .swagger-ui .info a,
    .swagger-ui .info a:visited {
      color: #9012fe;
    }

    .swagger-ui .info a:hover {
      color: #a73dff;
    }

    .swagger-ui .opblock .opblock-summary-method {
      color: #000 !important;
    }

    .swagger-ui .opblock .opblock-section-header {
      background: #111111 !important;
      border: 1px solid #222222;
    }

    .swagger-ui .opblock .opblock-section-header h4,
    .swagger-ui .opblock .opblock-section-header label {
      color: #fff !important;
    }

    .swagger-ui .opblock .try-out__btn,
    .swagger-ui .opblock .opblock-section-header h4,
    .swagger-ui .opblock .opblock-section-header .tab-header .tab-item,
    .swagger-ui .opblock .responses-inner h4,
    .swagger-ui .opblock .parameters-col_description,
    .swagger-ui .opblock .response-col_description,
    .swagger-ui .opblock .response-col_status,
    .swagger-ui .opblock .parameter__name,
    .swagger-ui .opblock .parameter__type {
      color: #9ca3af !important;
    }

    .swagger-ui .opblock input[type=text],
    .swagger-ui .opblock input[type=password],
    .swagger-ui .opblock input[type=search],
    .swagger-ui .opblock input[type=email],
    .swagger-ui .opblock textarea,
    .swagger-ui .opblock select {
      background: #111111 !important;
    }

    .swagger-ui .opblock.is-open input[type=text]:not([disabled]):not([readonly]),
    .swagger-ui .opblock.is-open input[type=password]:not([disabled]):not([readonly]),
    .swagger-ui .opblock.is-open input[type=search]:not([disabled]):not([readonly]),
    .swagger-ui .opblock.is-open input[type=email]:not([disabled]):not([readonly]),
    .swagger-ui .opblock.is-open textarea:not([disabled]):not([readonly]),
    .swagger-ui .opblock.is-open select:not([disabled]) {
      color: #fff !important;
    }

    .swagger-ui section.models h4,
    .swagger-ui section.models .model-title,
    .swagger-ui section.models .model-title__text,
    .swagger-ui section.models .property,
    .swagger-ui section.models .property.primitive,
    .swagger-ui section.models .model,
    .swagger-ui section.models .model-box {
      color: #fff !important;
    }

    .swagger-ui section.models .model-container,
    .swagger-ui section.models .model-box {
      background: #111111 !important;
    }

    .swagger-ui svg,
    .swagger-ui .arrow,
    .swagger-ui .expand-operation svg,
    .swagger-ui .opblock-tag svg,
    .swagger-ui .model-toggle::after,
    .swagger-ui .opblock-control-arrow svg {
      fill: #fff !important;
      color: #fff !important;
      stroke: #fff !important;
    }
  </style>
</head>

<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@4/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@4/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function () {
      window.ui = SwaggerUIBundle({
        url: "/swagger/openapi.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        layout: "StandaloneLayout"
      });
    };
  </script>
</body>

</html>
